<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }

  .dot { width: 9px; height: 9px; border-radius: 50%; background: #ffd25c; flex-shrink: 0; }

  .subtitle { color: #7c8399; font-size: 12.5px; margin: 6px 0 16px 0; font-family: -apple-system, sans-serif; }

  .card {
    position: relative; overflow: hidden;

  .symbol { color: #6b7185; font-size: 11px; letter-spacing: 0.5px; }

  .badge {
    font-size: 10.5px; font-weight: 700; padding: 4px 10px; border-radius: 20px;

function fmtTs(ms) {
  const d = new Date(ms);
  const p = n => String(n).padStart(2, "0");
  return `${d.getUTCFullYear()}-${p(d.getUTCMonth()+1)}-${p(d.getUTCDate())} ${p(d.getUTCHours())}:${p(d.getUTCMinutes())} ET`;
}
function badgeClassBias(bias) {
  if (bias === "bullish") return "bias-bullish";
  if (bias === "bearish") return "bias-bearish";
  return "bias-neutral";
}
function badgeClassSignal(sig) {
  if (sig === "ENTRY") return "sig-entry";
  if (sig && sig.startsWith("Watchlist")) return "sig-watch";
  return "sig-none";
}
function biasArrow(bias) {
  if (bias === "bullish") return "▲";
  if (bias === "bearish") return "▼";
  return "●";
}
function sweepText(sig) {
  if (!sig.sweep) return "–";
  const label = sig.sweep.type === "sell_side_sweep" ? "Sellside" : "Buyside";
  return `${label} @ ${(+sig.sweep.level).toPrecision(6)}`;
}
function bosText(sig) {
  if (!sig.bos) return "–";
  const arrow = sig.bos.dir === "up" ? "↑" : "↓";
  return `${arrow} @ ${(+sig.bos.level).toPrecision(6)}`;
}
function zoneText(sig) { return sig.zone ? sig.zone : "–"; }
function shortGrund(sig) {
  const s = sig.signal;
  if (s === "ENTRY") return "Preis in Entry-Zone";
  if (s.startsWith("Watchlist (Sweep ohne")) return "Sweep unbestätigt";
  if (s.startsWith("Watchlist (auf Retracement")) return "Wartet auf Retracement";
  if (s.startsWith("Watchlist (BOS bestätigt")) return "Keine Zone im Premium/Discount";
  if (s === "kein Setup") return "Kein Sweep in Bias-Richtung";
  return s;
}
function fmtOrDash(x) { return (x === null || x === undefined) ? "–" : x; }

function renderCard(asset, sig, ltf, error, aiNote) {
  const card = document.createElement("div");
  if (error) {
    card.className = "card glow-error";
    card.innerHTML = `<div class="card-head"><h2>${asset.icon} ${asset.name}</h2><span class="symbol">${asset.display}</span></div>
      <div class="badges"><span class="badge sig-error">FEHLER</span></div>
      <div class="err">${error}</div>`;
    return card;
  }
  card.className = "card" + (sig.signal === "ENTRY" ? " glow-entry" : "");

  const head = document.createElement("div");
  head.className = "card-head";
  head.innerHTML = `<h2>${asset.icon} ${asset.name}</h2><span class="symbol">${asset.display}</span>`;
  card.appendChild(head);

  const badges = document.createElement("div");
  badges.className = "badges";
  badges.innerHTML = `<span class="badge ${badgeClassBias(sig.bias)}">${biasArrow(sig.bias)} 4H ${sig.bias.toUpperCase()}</span>
    <span class="badge ${badgeClassSignal(sig.signal)}">${sig.signal.split(" (")[0]}</span>`;
  card.appendChild(badges);

  const table = document.createElement("div");
  table.className = "info-table";
  table.innerHTML = `
    <div class="row-grund"><span>Grund</span><span>${shortGrund(sig)}</span></div>
    <div><span>Sweep</span><span>${sweepText(sig)}</span></div>
    <div><span>BOS</span><span>${bosText(sig)}</span></div>
    <div><span>Zone</span><span>${zoneText(sig)}</span></div>
    <div class="row-entry"><span>Entry</span><span>${fmtOrDash(sig.entry)}</span></div>
    <div class="row-stop"><span>Stop</span><span>${fmtOrDash(sig.stop)}</span></div>
    <div class="row-target"><span>Target</span><span>${fmtOrDash(sig.target)}</span></div>
    <div><span>R:R</span><span>${sig.rr ? "1:" + sig.rr : "–"}</span></div>
    <div><span>Preis</span><span>${fmtOrDash(sig.currentPrice)}</span></div>`;
  card.appendChild(table);

  if (aiNote) {
    const note = document.createElement("div");
    note.className = "ai-note";
    note.innerHTML = `<span class="ai-label">KI-Einschätzung (ergänzend, ersetzt nicht die Regel-Engine)</span>${aiNote}`;
    card.appendChild(note);
  }

  const canvas = document.createElement("canvas");
  card.appendChild(canvas);
  const labels = ltf.map(r => fmtTs(r.ts).slice(5, 16));
  const lineColor = sig.bias === "bearish" ? "#ff6b6b" : "#4fff9c";
  const datasets = [{
    label: "Close (15min)", data: ltf.map(r => r.close),
    borderColor: lineColor, borderWidth: 1.6, pointRadius: 0, tension: 0.15,
    fill: true, backgroundColor: (ctx) => {
      const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 150);
      g.addColorStop(0, lineColor + "33"); g.addColorStop(1, lineColor + "00");
      return g;
    },
  }];
  if (sig.entry !== null) {
    datasets.push({ label: "Entry", data: ltf.map(() => sig.entry), borderColor: "#4fff9c", borderWidth: 1, borderDash: [4, 3], pointRadius: 0 });
    datasets.push({ label: "Stop", data: ltf.map(() => sig.stop), borderColor: "#ff6b6b", borderWidth: 1, borderDash: [4, 3], pointRadius: 0 });
    datasets.push({ label: "Target", data: ltf.map(() => sig.target), borderColor: "#ffd25c", borderWidth: 1, borderDash: [4, 3], pointRadius: 0 });
  }
  new Chart(canvas.getContext("2d"), {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: sig.entry !== null, labels: { boxWidth: 10, font: { size: 10 }, color: "#9198ad" } },
        tooltip: { backgroundColor: "#12141c", titleColor: "#e8eaf0", bodyColor: "#e8eaf0", borderColor: "rgba(255,255,255,0.1)", borderWidth: 1 },
      },
      scales: {
        x: { display: false },
        y: { ticks: { font: { size: 10 }, color: "#6b7185" }, grid: { color: "rgba(255,255,255,0.05)" } },
      },
    },
  });
  return card;
}

function main() {
  const gridEl = document.getElementById("grid");
  const newsEl = document.getElementById("news");

  if (PRECOMPUTED.news.length > 0) {
    const box = document.createElement("div");
    box.className = "news-box";
    box.innerHTML = `<div class="news-title">⚠ High-Impact News heute (USD/GBP)</div>` +
      PRECOMPUTED.news.map(ev => `<div class="news-item">${ev.date.slice(11,16)} ET — ${ev.event} (${ev.currency})</div>`).join("");
    newsEl.appendChild(box);
  } else {
    const box = document.createElement("div");
    box.className = "news-box empty";
    box.innerHTML = `<div class="news-title">✓ Keine High-Impact News (USD/GBP) heute</div>`;
    newsEl.appendChild(box);
  }

  for (const item of PRECOMPUTED.assets) {
    gridEl.appendChild(renderCard(item.asset, item.sig, item.ltf, item.error, item.aiNote));
  }
}
main();
