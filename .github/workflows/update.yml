name: Update TJR Report

on:
  schedule:
    # 08:00-14:59 Vienna (CEST/UTC+2): alle 15 Minuten
    - cron: "*/15 6-12 * * 1-5"
    # 15:00-16:59 Vienna: dichter getaktet, alle 5 Minuten (Kill-Zone / Fokusfenster)
    - cron: "*/5 13-14 * * 1-5"
    # 17:00-23:59 Vienna: wieder alle 15 Minuten
    - cron: "*/15 15-21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Report generieren
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node build.js

      - name: Änderungen committen und pushen
        run: |
          git config user.name "tjr-bot"
          git config user.email "actions@github.com"
          git add docs/index.html
          git diff --quiet --cached || git commit -m "Report aktualisiert: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
